services:
  - type: web
    name: bataryaopt
    runtime: static
    buildCommand: npm ci && npm run build
    envVars:
      - key: VITE_AUTH_USERS
        sync: false
    staticPublishPath: ./dist
    # Avoid CDN serving stale index.html that references removed hashed bundles (404 → text/plain MIME).
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
